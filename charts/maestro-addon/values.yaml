# Default values for maestro-addon.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  imageOverrides:
    maestroImage: quay.io/redhat-user-workloads/crt-redhat-acm-tenant/maestro-main/maestro-main:428b846656fd1f56a85dc894982be995c765d653 
    maestroAddOnImage: quay.io/redhat-user-workloads/crt-redhat-acm-tenant/maestro-main/maestro-addon-main:8fad6e7b5f09cc7c771560444e0d0143c2e0bac5 
    postgresImage: docker.io/library/postgres:17.2
  imagePullPolicy: IfNotPresent
  pullSecret: ""
  namespace: maestro

maestro:
  replicas: 1
  logLevel: 2

maestroAgent:
  logLevel: 2

addOnManager:
  namespace: open-cluster-management-hub

maestroAddOn:
  logLevel: 2

database:
  useExternalDB: false

messageQueue:
  amqStreams:
    name: "kafka"
    namespace: "amq-streams"
    listener:
      type: "route"
      port: 443
